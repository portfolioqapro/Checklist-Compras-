<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Checklist de Compras Today </title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 16px;
  }

  h2 {
    text-align: center;
  }

  .item {
    background: white;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input {
    transform: scale(1.3);
  }

  .done {
    text-decoration: line-through;
    opacity: 0.6;
  }
</style>
</head>

<body>

<h2>🛒 Checklist Compras ToDay✅ </h2>

<div class="item"><input type="checkbox" onchange="toggle(this)"> <span> 😊Sem novos pedidos por hoje 🎉✅  </span></div>


<script>
function toggle(el) {
  el.nextElementSibling.classList.toggle('done');
}
</script>

</body>
</html>
